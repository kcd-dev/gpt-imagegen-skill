name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile scripts
        run: |
          python -m py_compile scripts/image_gen.py scripts/remove_chroma_key.py
      - name: CLI dry run
        run: |
          python scripts/image_gen.py generate --prompt "test" --out output/imagegen/test.png --dry-run
      - name: Chroma key helper help
        run: |
          python scripts/remove_chroma_key.py --help >/dev/null
